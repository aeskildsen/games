<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watermelon Hoops</title>
<style>
  :root {
    --ink: #fff5e1;
  }
  * { box-sizing: border-box; user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #0b1c3a 0%, #2b1055 55%, #ff7e5f 100%);
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 1rem 1.4rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    pointer-events: none;
    font-weight: 800;
    text-shadow: 0 2px 8px #000a;
    z-index: 10;
  }
  .hud .level {
    font-size: 1.0rem;
    color: #c9b8ff;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.2rem;
  }
  .hud .level b { color: #06ffa5; font-size: 1.2rem; }
  .hud .level span { color: #fff; font-style: italic; }
  .hud .score { font-size: 1.6rem; }
  .hud .score b { color: #ffbe0b; }
  .hud .misses { font-size: 1.1rem; color: #ffb4c2; }
  .hud .hint {
    font-size: 0.9rem;
    color: #fff9;
    font-weight: 600;
    font-style: italic;
    text-align: right;
    line-height: 1.5;
  }
  .hud kbd {
    display: inline-block;
    padding: 0.05em 0.45em;
    border-radius: 5px;
    background: #ffffff22;
    border: 1px solid #ffffff44;
    font: inherit;
    font-style: normal;
    font-weight: 700;
    font-size: 0.85em;
    color: #fff;
  }
  .banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    font-size: clamp(3rem, 12vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #ffbe0b;
    text-shadow:
      0 0 30px #ff006e,
      0 8px 0 #8338ec,
      0 12px 40px #000;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.35s ease-out;
    white-space: nowrap;
  }
  .banner.show { opacity: 1; }
  .banner.score.show {
    color: #ffbe0b;
    text-shadow: 0 0 40px #ffbe0b, 0 8px 0 #ff006e, 0 14px 40px rgba(0,0,0,.7);
    animation: scoreBounce 0.7s cubic-bezier(.25,1.6,.45,1) forwards;
  }
  @keyframes scoreBounce {
    0%   { transform: translate(-50%, -50%) scale(0.15) rotate(-12deg); }
    55%  { transform: translate(-50%, -50%) scale(1.25) rotate(6deg); }
    80%  { transform: translate(-50%, -50%) scale(0.95) rotate(-4deg); }
    100% { transform: translate(-50%, -50%) scale(1.05) rotate(-3deg); }
  }
  .banner.miss.show {
    color: #ff3366;
    font-style: italic;
    font-weight: 900;
    letter-spacing: 0.05em;
    /* Drippy splat: stacked vertical drops below the glyphs to read as juice running */
    text-shadow:
      0 4px 0 #d11440,
      0 9px 0 #9c0e30,
      0 16px 0 #6a0a22,
      4px 22px 8px rgba(255,0,110,0.55),
      -3px 4px 0 #000,
      0 28px 30px rgba(0,0,0,0.45);
    animation: missDrip 1.8s cubic-bezier(.2,.55,.4,1) forwards;
  }
  @keyframes missDrip {
    0%   { transform: translate(-50%, -50%) scale(0.6) rotate(-18deg) skewX(-14deg); opacity: 0; }
    12%  { transform: translate(-50%, -50%) scale(1.35) rotate(7deg) skewX(10deg); opacity: 1; }
    22%  { transform: translate(-50%, -45%) scale(1.2) rotate(-3deg) skewX(-4deg); opacity: 1; }
    50%  { transform: translate(-50%, 10%) scale(1.1) rotate(6deg) skewX(6deg); opacity: 1; }
    80%  { transform: translate(-50%, 70%) scale(1) rotate(-8deg) skewX(-5deg); opacity: 1; }
    100% { transform: translate(-50%, 140%) scale(0.92) rotate(12deg) skewX(8deg); opacity: 0; }
  }
  .banner.lion.show {
    color: #ffb347;
    font-style: italic;
    text-shadow:
      -5px 5px 0 #5b3a22,
      0 0 40px #ff5a3a,
      0 0 80px #ff006eaa;
    animation: lionWiggle 0.7s ease-out forwards;
  }
  @keyframes lionWiggle {
    0%   { transform: translate(-50%, -50%) scale(0.3) rotate(-40deg); }
    50%  { transform: translate(-50%, -50%) scale(1.4) rotate(18deg); }
    100% { transform: translate(-50%, -50%) scale(1.1) rotate(8deg); }
  }
  .banner.win.show {
    background: linear-gradient(180deg, #fff, #ffbe0b 35%, #ff006e 65%, #8338ec);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 30px #ffbe0baa) drop-shadow(0 0 60px #ff006eaa);
    animation: winSwell 2.4s cubic-bezier(.2,.7,.3,1.4) forwards;
  }
  @keyframes winSwell {
    0%   { transform: translate(-50%, -50%) scale(0.05) rotate(720deg); opacity: 0; }
    35%  { transform: translate(-50%, -50%) scale(1.2) rotate(-6deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(-2deg); opacity: 1; }
  }
  .reset-btn {
    position: fixed;
    bottom: 1.2rem;
    right: 1.2rem;
    padding: 0.55rem 1.1rem;
    border-radius: 999px;
    border: 1.5px solid #ffffff44;
    background: #00000055;
    color: var(--ink);
    font: 700 0.9rem/1 ui-rounded, system-ui, sans-serif;
    cursor: pointer;
    backdrop-filter: blur(8px);
    z-index: 10;
    transition: transform .2s, background .2s;
  }
  .reset-btn:hover { background: #ff006e; transform: scale(1.05); }

  .cutscene {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 25;
    padding: 2rem;
    pointer-events: none;
  }
  .cutscene.show {
    display: flex;
    animation: csReveal 1.6s cubic-bezier(.2,.7,.3,1.2) backwards;
  }
  @keyframes csReveal {
    0%   { opacity: 0; filter: blur(20px) brightness(3); }
    40%  { opacity: 1; filter: blur(0) brightness(1.4); }
    100% { opacity: 1; filter: blur(0) brightness(1); }
  }
  .cs-title {
    font-size: clamp(2.5rem, 9vw, 6rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.95;
    margin: 0 0 0.6rem;
    background: linear-gradient(180deg, #fff, #ffbe0b 40%, #ff006e 70%, #8338ec);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 6px 24px #ff006eaa);
    animation: csWobble 3s ease-in-out infinite;
  }
  @keyframes csWobble {
    0%, 100% { transform: translateY(0) rotate(-1.5deg); }
    50%      { transform: translateY(-10px) rotate(1.5deg); }
  }
  .cs-sub {
    font-size: clamp(1rem, 2.6vw, 1.6rem);
    color: #fff5e1;
    font-style: italic;
    margin: 0 0 2.2rem;
    text-shadow: 0 4px 18px #000a;
  }
  .cs-replay {
    pointer-events: auto;
    padding: 0.9rem 2.2rem;
    font: 800 1.2rem/1 ui-rounded, system-ui, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-radius: 999px;
    border: 3px solid #fff;
    background: linear-gradient(135deg, #ff006e, #8338ec);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 10px 35px #ff006eaa;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .cs-replay:hover {
    transform: scale(1.07);
    box-shadow: 0 14px 45px #ff006edd;
  }
  body.cutscene-on .hud,
  body.cutscene-on .reset-btn { display: none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="hud">
  <div>
    <div class="level">LV <b id="level">1</b>/10 · <span id="levelLabel">Cake walk</span></div>
    <div class="score">🏀 <b id="score">0</b> swishes</div>
    <div class="misses">💥 <span id="misses">0</span> juicy disasters</div>
  </div>
  <div class="hint">
    <kbd>←</kbd> <kbd>→</kbd> aim · <kbd>↑</kbd> <kbd>↓</kbd> fine-tune<br>
    hold <kbd>Space</kbd> to charge · release to fire
  </div>
</div>

<div class="banner" id="banner"></div>

<div class="cutscene" id="cutscene">
  <h2 class="cs-title">WATERMELON HOMELAND</h2>
  <p class="cs-sub">the lions welcome you, mighty slinger ✨</p>
  <button class="cs-replay" id="csReplay">↻ play again</button>
</div>

<button class="reset-btn" id="reset">↻ reset</button>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const missesEl = document.getElementById('misses');
  const banner = document.getElementById('banner');
  const resetBtn = document.getElementById('reset');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    layoutScene();
  }
  window.addEventListener('resize', resize);

  // Scene
  const G = 1400;     // gravity px/s^2
  const GROUND_Y = () => H - 60;
  const launcher = { x: 0, y: 0, r: 26 };
  const hoop = { x: 0, y: 0, r: 52, rimT: 6, bbW: 14, bbH: 120, facing: 1 };
  // facing: +1 => backboard on right (opening faces left)
  //         -1 => backboard on left  (opening faces right)
  let score = 0, misses = 0;

  // hoopR: rim radius. dist: horizontal distance from launcher as fraction of W.
  // hoopY / launcherY: vertical placement as fraction of H (0 = top).
  // Note: gap between rim balls is 2*hoopR - 2*rimT. With melon diameter 44 and
  // rimT 6, hoopR must be >= ~32 for the melon to physically pass through.
  const LEVELS = [
    { hoopR: 95, dist: [0.18, 0.28], hoopY: [0.55, 0.68], launcherY: [0.74, 0.82], lions: 0, label: 'Cake walk' },
    { hoopR: 82, dist: [0.22, 0.34], hoopY: [0.50, 0.65], launcherY: [0.70, 0.82], lions: 0, label: 'Stroll' },
    { hoopR: 70, dist: [0.28, 0.40], hoopY: [0.45, 0.62], launcherY: [0.66, 0.80], lions: 0, label: 'Warming up' },
    { hoopR: 60, dist: [0.34, 0.48], hoopY: [0.35, 0.60], launcherY: [0.58, 0.78], lions: 0, label: 'Getting real' },
    { hoopR: 52, dist: [0.40, 0.55], hoopY: [0.28, 0.58], launcherY: [0.50, 0.78], lions: 1, lionSpeed: [55, 95],   label: 'Tricky · 🦁 spotted' },
    { hoopR: 46, dist: [0.45, 0.62], hoopY: [0.22, 0.58], launcherY: [0.40, 0.78], lions: 1, lionSpeed: [90, 140],  label: 'Spicy · 🦁' },
    { hoopR: 42, dist: [0.50, 0.70], hoopY: [0.18, 0.58], launcherY: [0.35, 0.78], lions: 2, lionSpeed: [110, 170], label: 'Diabolical · 🦁🦁' },
    { hoopR: 38, dist: [0.55, 0.78], hoopY: [0.15, 0.62], launcherY: [0.28, 0.78], lions: 3, lionSpeed: [140, 210], label: 'Pro shot · 🦁🦁🦁' },
    { hoopR: 36, dist: [0.60, 0.85], hoopY: [0.15, 0.65], launcherY: [0.22, 0.80], lions: 4, lionSpeed: [180, 250], label: 'Beyond mortal · 🦁🦁🦁🦁' },
    { hoopR: 34, dist: [0.55, 0.85], hoopY: [0.18, 0.65], launcherY: [0.25, 0.78], lions: 5, lionSpeed: [230, 320], label: 'Final Pride 🦁👑' },
  ];
  function currentLevel() { return LEVELS[Math.min(score, LEVELS.length - 1)]; }
  function currentLevelNum() { return Math.min(score + 1, LEVELS.length); }
  const levelEl = document.getElementById('level');
  const levelLabelEl = document.getElementById('levelLabel');
  function lerp(a, b, t) { return a + (b - a) * t; }

  // Aim & charge
  let aim = -Math.PI / 4; // up-right
  let power = 0;          // 0..1
  let charging = false;
  const POWER_RATE = 0.85;      // per second (so full charge ~1.17s)
  const MAX_POWER_SPEED = 1900; // px/s at full charge
  const MIN_POWER_SPEED = 350;  // minimal at near-zero
  const AIM_RATE = 1.6;         // rad/s while holding arrow
  const AIM_FINE_RATE = 0.5;    // rad/s for up/down fine adjust
  const keys = { left: false, right: false, up: false, down: false };

  function layoutScene() {
    placeForLevel();
    spawnLionsForLevel();
    updateLevelHUD();
  }

  function placeForLevel() {
    const lvl = currentLevel();
    hoop.r = lvl.hoopR;
    const bbMargin = lvl.hoopR + hoop.bbW + 40;
    for (let i = 0; i < 200; i++) {
      const lY = lerp(lvl.launcherY[0], lvl.launcherY[1], Math.random()) * H;
      const lX = 70 + Math.random() * (W - 140);
      const dist = lerp(lvl.dist[0], lvl.dist[1], Math.random()) * W;
      const side = Math.random() < 0.5 ? -1 : 1;
      const hX = lX + side * dist;
      const hY = lerp(lvl.hoopY[0], lvl.hoopY[1], Math.random()) * H;
      if (hX < bbMargin || hX > W - bbMargin) continue;
      if (hY < lvl.hoopR + 30 || hY > GROUND_Y() - 80) continue;
      if (lY < 100 || lY > GROUND_Y() - 30) continue;
      launcher.x = lX;
      launcher.y = lY;
      hoop.x = hX;
      hoop.y = hY;
      orientHoopToLauncher();
      const toHoopAng = Math.atan2(hoop.y - launcher.y, hoop.x - launcher.x);
      aim = toHoopAng - 0.5 - Math.random() * 0.4;
      return;
    }
    // Fallback if we never found a fit (narrow viewports etc.)
    launcher.x = W * 0.2;
    launcher.y = GROUND_Y() - 60;
    hoop.x = Math.min(W * 0.65, W - bbMargin);
    hoop.y = H * 0.5;
    orientHoopToLauncher();
    aim = Math.atan2(hoop.y - launcher.y, hoop.x - launcher.x) - 0.6;
  }

  function updateLevelHUD() {
    const lvl = currentLevel();
    levelEl.textContent = currentLevelNum();
    levelLabelEl.textContent = lvl.label;
  }

  // Backboard sits on the side away from the launcher, so the rim opening always
  // faces the player.
  function orientHoopToLauncher() {
    hoop.facing = launcher.x < hoop.x ? 1 : -1;
    // Re-clamp hoop so the backboard doesn't get pushed off-screen
    const bbExtra = hoop.bbW + 30;
    if (hoop.facing === 1) {
      hoop.x = Math.min(hoop.x, W - hoop.r - bbExtra);
    } else {
      hoop.x = Math.max(hoop.x, hoop.r + bbExtra);
    }
  }

  function backboardX() {
    return hoop.facing === 1
      ? hoop.x + hoop.r + 4
      : hoop.x - hoop.r - 4 - hoop.bbW;
  }

  // State
  let melon = null;
  let lions = [];
  let chunks = [];
  let seeds = [];
  let juice = [];
  let confetti = [];
  let stars = [];
  let lastT = performance.now();
  let cooldown = 0;
  let gameState = 'play'; // 'play' | 'cutscene'
  let csT = 0;
  let csLions = [];
  let csMelons = [];
  const csEl = document.getElementById('cutscene');
  const csReplayEl = document.getElementById('csReplay');

  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.7,
        r: Math.random() * 1.4 + 0.3,
        tw: Math.random() * Math.PI * 2,
      });
    }
  }

  function spawnLionsForLevel() {
    lions = [];
    const lvl = currentLevel();
    const n = lvl.lions;
    const [sMin, sMax] = lvl.lionSpeed || [120, 200];
    for (let i = 0; i < n; i++) {
      const dir = Math.random() < 0.5 ? 1 : -1;
      lions.push({
        x: dir > 0 ? -60 - i * 220 : W + 60 + i * 220,
        baseY: 110 + Math.random() * (H * 0.5),
        vx: dir * (sMin + Math.random() * (sMax - sMin)),
        bobPhase: Math.random() * Math.PI * 2,
        bobAmp: 16 + Math.random() * 18,
        bobSpeed: 1.4 + Math.random() * 0.8,
        wingPhase: Math.random() * Math.PI * 2,
        dir,
        eating: 0,
        r: 26,
        hearts: [],
      });
    }
  }
  function lionY(l) { return l.baseY + Math.sin(l.bobPhase) * l.bobAmp; }

  // --- input ---
  window.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (gameState !== 'play') return;
    if (e.code === 'ArrowLeft')  { keys.left = true;  e.preventDefault(); }
    if (e.code === 'ArrowRight') { keys.right = true; e.preventDefault(); }
    if (e.code === 'ArrowUp')    { keys.up = true;    e.preventDefault(); }
    if (e.code === 'ArrowDown')  { keys.down = true;  e.preventDefault(); }
    if (e.code === 'Space') {
      if (!melon && cooldown <= 0 && !charging) {
        charging = true;
        power = 0;
      }
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => {
    if (gameState !== 'play') {
      keys.left = keys.right = keys.up = keys.down = false;
      charging = false; power = 0;
      return;
    }
    if (e.code === 'ArrowLeft')  keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'ArrowUp')    keys.up = false;
    if (e.code === 'ArrowDown')  keys.down = false;
    if (e.code === 'Space') {
      if (charging) {
        charging = false;
        if (power > 0.05) fire();
        power = 0;
      }
      e.preventDefault();
    }
  });

  csReplayEl.addEventListener('click', exitCutscene);
  csReplayEl.addEventListener('mousedown', e => e.preventDefault());

  function fire() {
    const speed = MIN_POWER_SPEED + (MAX_POWER_SPEED - MIN_POWER_SPEED) * power;
    melon = {
      x: launcher.x,
      y: launcher.y,
      vx: Math.cos(aim) * speed,
      vy: Math.sin(aim) * speed,
      r: 22,
      rot: 0,
      vrot: (Math.random() - 0.5) * 8 + (Math.cos(aim) > 0 ? 6 : -6),
      alive: true,
      scored: false,
    };
  }

  resetBtn.addEventListener('click', () => {
    score = 0; misses = 0;
    scoreEl.textContent = '0';
    missesEl.textContent = '0';
    melon = null; chunks = []; seeds = []; juice = []; confetti = [];
    charging = false; power = 0; cooldown = 0;
    placeForLevel();
    spawnLionsForLevel();
    updateLevelHUD();
    flashBanner('');
  });
  // Don't let the reset button steal focus and break Space
  resetBtn.addEventListener('mousedown', e => e.preventDefault());

  // --- physics + collision ---
  function step(dt) {
    if (cooldown > 0) cooldown -= dt;

    if (!melon) {
      // Aim controls (only when not flying)
      if (keys.left)  aim -= AIM_RATE * dt;
      if (keys.right) aim += AIM_RATE * dt;
      if (keys.up)    aim -= AIM_FINE_RATE * dt;
      if (keys.down)  aim += AIM_FINE_RATE * dt;
      if (charging) {
        power = Math.min(1, power + POWER_RATE * dt);
      }
    }

    // Lions roam regardless of melon state
    updateLions(dt);

    if (melon && melon.alive) {
      melon.vy += G * dt;
      melon.x += melon.vx * dt;
      melon.y += melon.vy * dt;
      melon.rot += melon.vrot * dt;

      if (!melon.scored) {
        // Lion catch: a hungry vegetarian intercepts the melon
        for (const l of lions) {
          if (l.eating > 0) continue;
          const ly = lionY(l);
          if (Math.hypot(melon.x - l.x, melon.y - ly) < melon.r + l.r * 0.8) {
            lionEatsMelon(l);
            return;
          }
        }

        // Pass through hoop ring
        const hl = hoop.x - hoop.r, hr = hoop.x + hoop.r;
        const inX = melon.x > hl + 6 && melon.x < hr - 6;
        const crossY = melon.y >= hoop.y && (melon.y - melon.vy * dt) < hoop.y;
        if (inX && crossY && melon.vy > 0) {
          scoreSwish();
          // Don't return — let physics keep running so the melon falls through.
        } else {
          // Rim bounce (only if we didn't just score this frame)
          for (const rim of [{ x: hl, y: hoop.y }, { x: hr, y: hoop.y }]) {
            const dx = melon.x - rim.x;
            const dy = melon.y - rim.y;
            const d = Math.hypot(dx, dy);
            const min = melon.r + hoop.rimT;
            if (d < min) {
              const nx = dx / (d || 1);
              const ny = dy / (d || 1);
              melon.x = rim.x + nx * (min + 0.1);
              melon.y = rim.y + ny * (min + 0.1);
              const vDotN = melon.vx * nx + melon.vy * ny;
              if (vDotN < 0) {
                melon.vx -= 2 * vDotN * nx;
                melon.vy -= 2 * vDotN * ny;
                melon.vx *= 0.55;
                melon.vy *= 0.55;
                melon.vrot += (Math.random() - 0.5) * 8;
              }
            }
          }

          // Backboard bounce
          const bbX = backboardX();
          const bbR = bbX + hoop.bbW;
          const bbTop = hoop.y - hoop.bbH * 0.7;
          const bbBot = hoop.y + hoop.bbH * 0.3;
          if (melon.x + melon.r > bbX && melon.x - melon.r < bbR &&
              melon.y > bbTop && melon.y < bbBot) {
            if (hoop.facing === 1) {
              melon.x = bbX - melon.r - 0.1;
            } else {
              melon.x = bbR + melon.r + 0.1;
            }
            if (melon.vx * (hoop.facing) > 0) {
              melon.vx = -melon.vx * 0.45;
              melon.vy *= 0.75;
              melon.vrot *= 0.6;
            }
          }
        }
      }

      // Ground
      if (melon.y + melon.r >= GROUND_Y()) {
        if (melon.scored) {
          happyLanding();
        } else {
          explodeMelon();
        }
        return;
      }
      // Off-screen
      if (melon.x < -150 || melon.x > W + 150 || melon.y > H + 200) {
        if (melon.scored) {
          advanceAfterScore();
        }
        melon = null;
        cooldown = 0.4;
      }
    }

    // chunks
    for (const c of chunks) {
      c.vy += G * 0.8 * dt;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.rot += c.vrot * dt;
      c.life -= dt;
      if (c.y > GROUND_Y() - 4) {
        c.y = GROUND_Y() - 4;
        c.vy *= -0.35;
        c.vx *= 0.7;
        if (Math.abs(c.vy) < 30) c.vy = 0;
      }
    }
    chunks = chunks.filter(c => c.life > 0);

    for (const s of seeds) {
      s.vy += G * 0.9 * dt;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.rot += s.vrot * dt;
      s.life -= dt;
      if (s.y > GROUND_Y() - 2) {
        s.y = GROUND_Y() - 2;
        s.vy *= -0.3; s.vx *= 0.6;
      }
    }
    seeds = seeds.filter(s => s.life > 0);

    for (const j of juice) {
      j.vy += G * 0.5 * dt;
      j.x += j.vx * dt;
      j.y += j.vy * dt;
      j.life -= dt;
      j.r *= (1 - dt * 0.4);
    }
    juice = juice.filter(j => j.life > 0 && j.r > 0.5);

    for (const c of confetti) {
      c.vy += G * 0.3 * dt;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.rot += c.vrot * dt;
      c.life -= dt;
    }
    confetti = confetti.filter(c => c.life > 0);
  }

  function scoreSwish() {
    if (!melon || melon.scored) return;
    melon.scored = true;
    // Give the melon a tiny extra downward kick so it really feels like it dropped.
    melon.vy = Math.max(melon.vy, 380);
    melon.vx *= 0.55;
    melon.vrot += (Math.random() < 0.5 ? -1 : 1) * 4;
    const prevLevel = currentLevelNum();
    score++;
    scoreEl.textContent = score;
    partyTime();
    const nextLevel = currentLevelNum();
    const leveledUp = nextLevel !== prevLevel;
    if (score === LEVELS.length) {
      flashBanner('CHAMPION! 🦁👑', 'win');
    } else if (leveledUp) {
      flashBanner(pickCelebration(), 'score');
      setTimeout(() => flashBanner(`LEVEL ${nextLevel}!`, 'score'), 1000);
    } else {
      flashBanner(pickCelebration(), 'score');
    }
  }

  function happyLanding() {
    if (!melon) return;
    const mx = melon.x;
    const my = GROUND_Y() - melon.r;
    // Sparkles + small juice puff (gentle — the melon survived its destiny)
    const colors = ['#ffbe0b', '#06ffa5', '#ff70a6', '#fff5e1', '#8338ec'];
    for (let i = 0; i < 70; i++) {
      const a = -Math.PI + Math.random() * Math.PI; // upward fan
      const sp = 120 + Math.random() * 360;
      confetti.push({
        x: mx + (Math.random() - 0.5) * 20,
        y: my,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        size: 4 + Math.random() * 7,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 14,
        kind: Math.random() < 0.5 ? 'circle' : 'rect',
        life: 1.4 + Math.random() * 1.2,
      });
    }
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 220;
      juice.push({
        x: mx, y: my + 6,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 40,
        r: 3 + Math.random() * 6,
        life: 0.8 + Math.random() * 0.7,
      });
    }
    melon = null;
    cooldown = 0.8;
    advanceAfterScore();
  }

  function advanceAfterScore() {
    if (score >= LEVELS.length) {
      // Last swish completed — transport to the homeland.
      setTimeout(enterCutscene, 1100);
      return;
    }
    setTimeout(() => {
      placeForLevel();
      spawnLionsForLevel();
      updateLevelHUD();
    }, 750);
  }

  function lionEatsMelon(l) {
    l.eating = 1.2;
    // Hearts above lion
    for (let i = 0; i < 8; i++) {
      l.hearts.push({
        x: (Math.random() - 0.5) * 30,
        y: -10,
        vx: (Math.random() - 0.5) * 60,
        vy: -60 - Math.random() * 40,
        life: 1.0 + Math.random() * 0.5,
      });
    }
    melon = null;
    cooldown = 0.6;
    misses++;
    missesEl.textContent = misses;
    flashBanner(pickLionLine(), 'lion');
  }

  function updateLions(dt) {
    for (const l of lions) {
      l.x += l.vx * dt;
      l.bobPhase += l.bobSpeed * dt;
      l.wingPhase += dt * 18;
      if (l.eating > 0) l.eating -= dt;
      for (const h of l.hearts) {
        h.x += h.vx * dt;
        h.y += h.vy * dt;
        h.vy += 30 * dt;
        h.life -= dt;
      }
      l.hearts = l.hearts.filter(h => h.life > 0);
      if (l.dir > 0 && l.x > W + 80) {
        l.x = -80;
        l.baseY = 110 + Math.random() * (H * 0.5);
      } else if (l.dir < 0 && l.x < -80) {
        l.x = W + 80;
        l.baseY = 110 + Math.random() * (H * 0.5);
      }
    }
  }

  function explodeMelon() {
    if (!melon) return;
    misses++;
    missesEl.textContent = misses;
    const mx = melon.x, my = melon.y, mvx = melon.vx, mvy = melon.vy;
    melon = null;
    cooldown = 0.7;
    const N_CHUNKS = 260;
    const N_SEEDS = 180;
    const N_JUICE = 80;
    for (let i = 0; i < N_CHUNKS; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 720;
      chunks.push({
        x: mx + (Math.random() - 0.5) * 10,
        y: my + (Math.random() - 0.5) * 10,
        vx: mvx * 0.15 + Math.cos(a) * sp,
        vy: mvy * 0.15 + Math.sin(a) * sp - 100,
        size: 3 + Math.random() * 10,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 14,
        kind: Math.random() < 0.7 ? 'flesh' : 'rind',
        life: 2.5 + Math.random() * 2.5,
      });
    }
    for (let i = 0; i < N_SEEDS; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 100 + Math.random() * 600;
      seeds.push({
        x: mx, y: my,
        vx: mvx * 0.2 + Math.cos(a) * sp,
        vy: mvy * 0.2 + Math.sin(a) * sp - 80,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 18,
        life: 2 + Math.random() * 2,
      });
    }
    for (let i = 0; i < N_JUICE; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 500;
      juice.push({
        x: mx, y: my,
        vx: mvx * 0.1 + Math.cos(a) * sp,
        vy: mvy * 0.1 + Math.sin(a) * sp - 60,
        r: 4 + Math.random() * 12,
        life: 1.2 + Math.random() * 1.4,
      });
    }
    flashBanner(pickFailure(), 'miss');
    screenShake(22, 0.5);
  }

  function partyTime() {
    const colors = ['#ff006e', '#ffbe0b', '#8338ec', '#3a86ff', '#06ffa5', '#fb5607', '#ff70a6'];
    for (let i = 0; i < 400; i++) {
      confetti.push({
        x: hoop.x + (Math.random() - 0.5) * 60,
        y: hoop.y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 700,
        vy: -200 - Math.random() * 600,
        size: 4 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 14,
        kind: Math.random() < 0.4 ? 'circle' : 'rect',
        life: 2.4 + Math.random() * 2.0,
      });
    }
  }

  const CELEBRATIONS = ['SWISH!', 'BUCKETS!', 'COLD!', 'NICE!', 'KOBE!', '🎉 PARTY!', 'FRUITY!', 'JUICY!', 'AWESOME!', "BEE'S KNEES!", 'CAT\'S PYJAMAS!', 'BOOYAH!', 'HOT SAUCE!', 'MAGNIFICENT!', 'SCRUMPTIOUS!'];
  const FAILURES = ['SPLAT!', 'OOF!', 'YIKES!', '💥 BOOM!', 'BRICK!', 'TRAGIC!', 'RIP MELON', 'JUICE EVERYWHERE'];
  const LION_LINES = ['NOM!', 'YUM 🦁', 'VEGAN STRIKE!', 'LION-FED!', 'CRUNCH!', 'STOLEN!', 'KING\'S LUNCH'];
  function pickCelebration() { return CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)]; }
  function pickFailure() { return FAILURES[Math.floor(Math.random() * FAILURES.length)]; }
  function pickLionLine() { return LION_LINES[Math.floor(Math.random() * LION_LINES.length)]; }
  let bannerTimer = null;
  const BANNER_VARIANTS = ['score', 'miss', 'lion', 'win'];
  function flashBanner(text, variant = 'score') {
    banner.classList.remove('show', ...BANNER_VARIANTS);
    if (!text) return;
    // Force reflow so the animation restarts cleanly on repeated calls.
    void banner.offsetWidth;
    banner.textContent = text;
    banner.classList.add('show', variant);
    clearTimeout(bannerTimer);
    const lingers = { score: 1200, miss: 1900, lion: 1200, win: 2600 };
    const linger = lingers[variant] ?? 1200;
    bannerTimer = setTimeout(() => banner.classList.remove('show'), linger);
  }

  let shakeAmt = 0, shakeT = 0;
  function screenShake(a, t) { shakeAmt = a; shakeT = t; }

  // --- rendering ---
  function draw() {
    let ox = 0, oy = 0;
    if (shakeT > 0) {
      ox = (Math.random() - 0.5) * shakeAmt;
      oy = (Math.random() - 0.5) * shakeAmt;
    }

    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(ox, oy);

    drawStars();
    drawGround();
    drawHoop();
    drawLauncher();
    drawAimAndPreview();
    drawPowerMeter();
    drawMelon();
    drawLions();
    drawChunks();
    drawSeeds();
    drawJuice();
    drawConfetti();

    ctx.restore();
  }

  function drawLion(l, y) {
    ctx.save();
    ctx.translate(l.x, y);
    ctx.scale(l.dir, 1);
    const wf = Math.sin(l.wingPhase);
    ctx.fillStyle = '#ffffffd5';
    ctx.strokeStyle = '#0b1c3a55';
    ctx.lineWidth = 1.5;
    for (const wsign of [-1, 1]) {
      ctx.save();
      ctx.translate(0, -10);
      ctx.rotate(wsign * (0.2 + wf * 0.5));
      ctx.beginPath();
      ctx.ellipse(0, -wsign * 4, 30 * l.r / 26, 12 * l.r / 26, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = '#a0522d';
    ctx.beginPath();
    const spikes = 16;
    for (let i = 0; i < spikes; i++) {
      const a = (i / spikes) * Math.PI * 2;
      const r = i % 2 === 0 ? l.r + 4 : l.r - 2;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f4a460';
    ctx.beginPath();
    ctx.arc(0, 0, l.r - 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffd9a8';
    ctx.beginPath();
    ctx.arc(-l.r * 0.25, l.r * 0.15, l.r * 0.18, 0, Math.PI * 2);
    ctx.arc(l.r * 0.25, l.r * 0.15, l.r * 0.18, 0, Math.PI * 2);
    ctx.fill();
    const eyeY = l.eating > 0 ? -1 : -3;
    if (l.eating > 0) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(-l.r * 0.25, eyeY, 3, Math.PI, 0);
      ctx.arc(l.r * 0.25, eyeY, 3, Math.PI, 0);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-l.r * 0.25, eyeY, 2.4, 0, Math.PI * 2);
      ctx.arc(l.r * 0.25, eyeY, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#2a1010';
    ctx.beginPath();
    ctx.moveTo(0, 1);
    ctx.lineTo(-3, 4);
    ctx.lineTo(3, 4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a1010';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    if (l.eating > 0) {
      ctx.arc(0, 7, 5, 0, Math.PI);
      ctx.fillStyle = '#ff5a7e';
      ctx.fill();
    } else {
      ctx.arc(0, 6, 5, 0.2, Math.PI - 0.2);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawLions() {
    for (const l of lions) {
      const y = lionY(l);
      drawLion(l, y);
      for (const h of l.hearts) {
        ctx.save();
        ctx.translate(l.x + h.x, y + h.y);
        ctx.globalAlpha = Math.min(1, h.life);
        ctx.fillStyle = '#ff3366';
        ctx.font = '20px serif';
        ctx.textAlign = 'center';
        ctx.fillText('♥', 0, 0);
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;
  }


  function drawStars() {
    for (const s of stars) {
      const a = 0.45 + 0.45 * Math.sin(s.tw);
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawGround() {
    const gy = GROUND_Y();
    const grad = ctx.createLinearGradient(0, gy, 0, H);
    grad.addColorStop(0, '#2a0d1a');
    grad.addColorStop(1, '#0a0410');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, H - gy);
    ctx.strokeStyle = '#ff006e88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(W, gy);
    ctx.stroke();
  }

  function drawLauncher() {
    const x = launcher.x, y = launcher.y;
    // little floating pad/cloud
    ctx.fillStyle = '#ffffff22';
    ctx.beginPath();
    ctx.ellipse(x, y + 22, 44, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff44';
    ctx.beginPath();
    ctx.ellipse(x - 8, y + 19, 28, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // y-fork
    ctx.strokeStyle = '#5b3a22';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 5, y + 10);
    ctx.lineTo(x - 22, y - 12);
    ctx.moveTo(x + 5, y + 10);
    ctx.lineTo(x + 22, y - 12);
    ctx.moveTo(x, y + 10);
    ctx.lineTo(x, y + 22);
    ctx.stroke();
    // band
    ctx.strokeStyle = '#8b5a3c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 22, y - 12);
    ctx.lineTo(x + 22, y - 12);
    ctx.stroke();
    // melon sitting
    if (!melon) drawWatermelon(x, y - 4, 22, 0);
  }

  function drawAimAndPreview() {
    if (melon) return;
    const x = launcher.x, y = launcher.y - 4;
    // Aim arrow
    const len = 55 + power * 35;
    const ax = x + Math.cos(aim) * len;
    const ay = y + Math.sin(aim) * len;
    ctx.strokeStyle = charging ? '#ffbe0b' : '#ffffffcc';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(ax, ay);
    ctx.stroke();
    // arrowhead
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(aim);
    ctx.fillStyle = charging ? '#ffbe0b' : '#ffffffcc';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-10, -6);
    ctx.lineTo(-10, 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Short trajectory preview (only a few dots so it doesn't give away the landing)
    const speed = MIN_POWER_SPEED + (MAX_POWER_SPEED - MIN_POWER_SPEED) * power;
    let px = x, py = y;
    let pvx = Math.cos(aim) * speed;
    let pvy = Math.sin(aim) * speed;
    const dt = 0.035;
    const N = 6;
    for (let i = 0; i < N; i++) {
      pvy += G * dt;
      px += pvx * dt;
      py += pvy * dt;
      const a = (1 - i / N) * 0.75;
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(px, py, 3.2 - i * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPowerMeter() {
    if (melon) return;
    const x = launcher.x, y = launcher.y;
    const w = 70, h = 8;
    const px = x - w / 2, py = y + 38;
    ctx.fillStyle = '#00000077';
    ctx.fillRect(px - 2, py - 2, w + 4, h + 4);
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(px, py, w, h);
    const grad = ctx.createLinearGradient(px, 0, px + w, 0);
    grad.addColorStop(0, '#06ffa5');
    grad.addColorStop(0.6, '#ffbe0b');
    grad.addColorStop(1, '#ff006e');
    ctx.fillStyle = grad;
    ctx.fillRect(px, py, w * power, h);
    if (charging) {
      ctx.strokeStyle = '#ffbe0b';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(px - 1, py - 1, w + 2, h + 2);
    }
  }

  function drawWatermelon(x, y, r, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.fillStyle = '#0e6b1f';
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#7ed957';
    ctx.lineWidth = Math.max(2, r * 0.18);
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.85, a - 0.15, a + 0.15);
      ctx.stroke();
    }
    ctx.strokeStyle = '#e9ffd6';
    ctx.lineWidth = Math.max(1.5, r * 0.10);
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ff5a7e';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.62, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1c0a0a';
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 + 0.4;
      const sx = Math.cos(a) * r * 0.35;
      const sy = Math.sin(a) * r * 0.35;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.09, r * 0.05, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#ffffff55';
    ctx.beginPath();
    ctx.arc(-r * 0.35, -r * 0.35, r * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawMelon() {
    if (!melon) return;
    drawWatermelon(melon.x, melon.y, melon.r, melon.rot);
  }

  function drawHoop() {
    const x = hoop.x, y = hoop.y;
    const bbX = backboardX();
    // Pole on the outer edge of the backboard (away from rim)
    const poleX = hoop.facing === 1 ? bbX + hoop.bbW - 4 : bbX - 2;
    ctx.fillStyle = '#444';
    ctx.fillRect(poleX, y - 8, 6, GROUND_Y() - (y - 8));
    ctx.fillStyle = '#fff';
    ctx.fillRect(bbX, y - hoop.bbH * 0.7, hoop.bbW, hoop.bbH);
    ctx.fillStyle = '#ff006e';
    ctx.fillRect(bbX, y - hoop.bbH * 0.2, hoop.bbW, 4);
    ctx.strokeStyle = '#ff006e';
    ctx.lineWidth = 2;
    ctx.strokeRect(bbX + 2, y - 18, hoop.bbW - 4, 24);

    ctx.strokeStyle = '#ff5a3a';
    ctx.lineWidth = hoop.rimT * 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - hoop.r, y);
    ctx.lineTo(x + hoop.r, y);
    ctx.stroke();
    ctx.fillStyle = '#ff5a3a';
    ctx.beginPath(); ctx.arc(x - hoop.r, y, hoop.rimT, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + hoop.r, y, hoop.rimT, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = '#ffffffcc';
    ctx.lineWidth = 1.2;
    const netH = 36;
    const segs = 9;
    for (let i = 0; i <= segs; i++) {
      const tx = x - hoop.r + (i / segs) * hoop.r * 2;
      const bx = x - hoop.r * 0.6 + (i / segs) * hoop.r * 1.2;
      ctx.beginPath();
      ctx.moveTo(tx, y);
      ctx.lineTo(bx, y + netH);
      ctx.stroke();
    }
    for (let i = 0; i < 4; i++) {
      const yy = y + ((i + 1) / 5) * netH;
      const k = (i + 1) / 5;
      const lx = x - hoop.r + (hoop.r * 0.4) * k;
      const rx = x + hoop.r - (hoop.r * 0.4) * k;
      ctx.beginPath();
      ctx.moveTo(lx, yy);
      ctx.lineTo(rx, yy);
      ctx.stroke();
    }
  }

  function drawChunks() {
    for (const c of chunks) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      const alpha = Math.min(1, c.life / 1.5);
      ctx.globalAlpha = alpha;
      if (c.kind === 'flesh') {
        ctx.fillStyle = '#ff5a7e';
      } else {
        ctx.fillStyle = Math.random() < 0.5 ? '#0e6b1f' : '#7ed957';
      }
      ctx.beginPath();
      ctx.moveTo(-c.size, 0);
      ctx.lineTo(0, -c.size * 0.7);
      ctx.lineTo(c.size, 0);
      ctx.lineTo(0, c.size * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawSeeds() {
    ctx.fillStyle = '#1c0a0a';
    for (const s of seeds) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.globalAlpha = Math.min(1, s.life / 1.5);
      ctx.beginPath();
      ctx.ellipse(0, 0, 3, 1.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawJuice() {
    for (const j of juice) {
      ctx.globalAlpha = Math.min(0.6, j.life / 2);
      ctx.fillStyle = '#ff3366';
      ctx.beginPath();
      ctx.arc(j.x, j.y, j.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawConfetti() {
    for (const c of confetti) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.globalAlpha = Math.min(1, c.life / 1.5);
      ctx.fillStyle = c.color;
      if (c.kind === 'rect') {
        ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, c.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function loop(t) {
    const dt = Math.min(0.033, (t - lastT) / 1000);
    lastT = t;
    for (const s of stars) s.tw += dt * 2;
    if (shakeT > 0) {
      shakeT -= dt;
      shakeAmt *= 0.92;
      if (shakeT <= 0) { shakeAmt = 0; shakeT = 0; }
    }
    if (gameState === 'cutscene') {
      updateCutscene(dt);
      drawCutsceneFrame();
    } else {
      step(dt);
      draw();
    }
    requestAnimationFrame(loop);
  }

  function enterCutscene() {
    gameState = 'cutscene';
    csT = 0;
    charging = false; power = 0;
    melon = null;
    chunks = []; seeds = []; juice = []; confetti = [];
    setupCutscene();
    document.body.classList.add('cutscene-on');
    csEl.classList.add('show');
  }

  function exitCutscene() {
    gameState = 'play';
    csEl.classList.remove('show');
    document.body.classList.remove('cutscene-on');
    score = 0; misses = 0;
    scoreEl.textContent = '0';
    missesEl.textContent = '0';
    placeForLevel();
    spawnLionsForLevel();
    updateLevelHUD();
    flashBanner('');
  }

  function setupCutscene() {
    csLions = [];
    const N = 9;
    for (let i = 0; i < N; i++) {
      const dir = Math.random() < 0.5 ? 1 : -1;
      csLions.push({
        x: Math.random() * W,
        baseY: 90 + Math.random() * (H - 220),
        vx: dir * (60 + Math.random() * 140),
        vy: (Math.random() - 0.5) * 40,
        bobPhase: Math.random() * Math.PI * 2,
        bobAmp: 12 + Math.random() * 22,
        bobSpeed: 0.9 + Math.random() * 1.1,
        wingPhase: Math.random() * Math.PI * 2,
        dir,
        eating: 0,
        r: 22 + Math.random() * 22,
        hearts: [],
      });
    }
    csMelons = [];
    const M = 22;
    for (let i = 0; i < M; i++) {
      csMelons.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vy: -(15 + Math.random() * 35),
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.6 + Math.random() * 1.4,
        wobbleAmp: 10 + Math.random() * 30,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 1.4,
        r: 12 + Math.random() * 22,
      });
    }
  }

  function updateCutscene(dt) {
    csT += dt;
    for (const l of csLions) {
      l.x += l.vx * dt;
      l.bobPhase += l.bobSpeed * dt;
      l.wingPhase += dt * 16;
      if (l.x < -80) l.x = W + 80;
      if (l.x > W + 80) l.x = -80;
    }
    for (const m of csMelons) {
      m.wobblePhase += m.wobbleSpeed * dt;
      m.y += m.vy * dt;
      m.rot += m.vrot * dt;
      if (m.y + m.r < -40) {
        m.y = H + 40;
        m.x = Math.random() * W;
      }
    }
  }

  function drawCutsceneFrame() {
    // Dreamy gradient sky
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#ff70a6');
    grad.addColorStop(0.35, '#ffbe0b');
    grad.addColorStop(0.7, '#8338ec');
    grad.addColorStop(1, '#3a86ff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Soft sun glow
    const cx = W * 0.72, cy = H * 0.32;
    const sgrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 240);
    sgrad.addColorStop(0, '#fff5e1ee');
    sgrad.addColorStop(0.35, '#ffbe0baa');
    sgrad.addColorStop(1, '#ff006e00');
    ctx.fillStyle = sgrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 240, 0, Math.PI * 2);
    ctx.fill();

    // Twinkling sparkles
    for (const s of stars) {
      ctx.globalAlpha = 0.4 + 0.4 * Math.sin(s.tw + csT * 2);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Floating melons
    for (const m of csMelons) {
      const wx = m.x + Math.sin(m.wobblePhase) * m.wobbleAmp;
      drawWatermelon(wx, m.y, m.r, m.rot);
    }

    // Lions
    for (const l of csLions) {
      const y = l.baseY + Math.sin(l.bobPhase) * l.bobAmp;
      drawLion(l, y);
    }
  }

  resize();
  initStars();
  requestAnimationFrame(loop);
})();
</script>
